<!DOCTYPE html>
<html lang="en">
	<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Savings</title>
		<link rel="stylesheet" href="css/savings.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    </head>
	<body>
		<header>
            <nav class="navbar navbar-expand-md shadow-sm navbar-dark">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold" href="index.html">
                        <i class="bi"></i>.EXE
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="menu">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item">
                                <a href="index.html" class="nav-link">Home</a>
                            </li>
                            <li class="nav-item">
                                <a href="budget.html" class="nav-link">Budget</a>
                            </li>
                            <li class="nav-item">
                                <a href="savings.html" class="nav-link active">Savings</a>
                            </li>
                            <li class="nav-item">
                                <a href="profile.html" class="nav-link">Profile</a>
                            </li>
							<li class="nav-item">
                                <a href="login.html" class="nav-link">Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
		<!--view / edit / add modal-->
		<div class="modal" id="goal-modal">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<div id="goal-modal-title" class="modal-title">
							View
						</div>
						<button class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<form action="">
							<div class="row mb-2">
								<div class="col-12 col-md-3">
									<label for="goal-name" class="col-form-label">Goal Name</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<div class="input-group-text"><i class="bi bi-award-fill"></i></div>
										<input id="goal-name" type="text" class="form-control editable">
									</div>
								</div>
							</div>
							<div class="row mb-2">
								<div class="col-12 col-md-3">
									<label for="goal-deadline" class="col-form-label">Deadline</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<span class="input-group-text"><i class="bi bi-calendar-fill"></i></span>
										<input id="goal-deadline" class="form-control editable" type="date" name="deadline">
									</div>
								</div>
							</div>
							<div class="row mb-2">
								<div class="col-12 col-md-3">
									<label for="goal-target" class="col-form-label">
										Target
									</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
										<input id="goal-target" type="number" step="0.01" class="form-control editable" placeholder="0.00">
									</div>
								</div>
							</div>
							<div class="row mb-2 view-mode">
								<div class="col-12 col-md-3">
									<label for="goal-saved" class="col-form-label">
										Saved
									</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
										<input id="goal-saved" type="number" class="form-control-plaintext w-auto ms-2" value="0.00" readonly>
									</div>
								</div>
							</div>
							<div class="row mb-2 view-mode">
								<div class="col-12 col-md-3">
									<label for="goal-required" class="col-form-label">
										Required
									</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
										<input id="goal-required" type="number" class="form-control-plaintext w-auto ms-2" value="0.00" readonly>
									</div>
								</div>
							</div>
							<div class="row mb-2 view-mode">
								<div class="col-12 col-md-3">
									<label for="goal-remaining" class="col-form-label">
										Remaining
									</label>
								</div>
								<div class="col-12 col-md-9">
									<div class="input-group">
										<span class="input-group-text"><i class="bi bi-calendar-range"></i></span>
										<input id="goal-remaining" type="text" class="form-control-plaintext w-auto ms-2" value="0" readonly>
									</div>
								</div>
							</div>
							<div class="row mb-2">
								<div class="col-12 col-md-3">
									<label for="category" class="col-form-label">Category</label>
								</div>
								<div class="col-12 col-md-9 choices">
									<input id="category-short" type="radio" class="btn-check"  name="category" value="short">
									<label for="category-short" class="btn btn-outline-dark editable-radio">Short</label>
									<input id="category-middle" type="radio" class="btn-check"  name="category" value="middle">
									<label for="category-middle" class="btn btn-outline-dark editable-radio">Middle</label>
									<input id="category-long" type="radio" class="btn-check"  name="category" value="long">
									<label for="category-long" class="btn btn-outline-dark editable-radio">Long</label>
								</div>
							</div>
							<div class="row mb-2">
								<div class="col-12 col-md-3">
									<label for="type" class="col-form-label">Type</label>
								</div>
								<div class="col-12 col-md-9 types">
									<input value="wallet" type="radio" class="btn-check" name="type" id="default">
									<label class="btn btn-outline-dark" for="default"><i class="bi bi-wallet-fill"></i></label>

									<input value="airplane" type="radio" class="btn-check" name="type" id="travel">
									<label class="btn btn-outline-dark" for="travel"><i class="bi bi-airplane-fill"></i></label>

									<input value="lightning-charge" type="radio" class="btn-check" name="type" id="utility">
									<label class="btn btn-outline-dark" for="utility"><i class="bi bi-lightning-charge-fill"></i></label>

									<input value="cup-hot" type="radio" class="btn-check" name="type" id="food">
									<label class="btn btn-outline-dark" for="food"><i class="bi bi-cup-hot-fill"></i></label>

									<input value="car-front" type="radio" class="btn-check" name="type" id="vehicle">
									<label class="btn btn-outline-dark" for="vehicle"><i class="bi bi-car-front-fill"></i></label>

									<input value="gift" type="radio" class="btn-check" name="type" id="wishlist">
									<label class="btn btn-outline-dark" for="wishlist"><i class="bi bi-gift-fill"></i></label>

									<input value="mortarboard" type="radio" class="btn-check" name="type" id="education">
									<label class="btn btn-outline-dark" for="education"><i class="bi bi-mortarboard-fill"></i></label>

									<input value="laptop" type="radio" class="btn-check" name="type" id="electronic">
									<label class="btn btn-outline-dark" for="electronic"><i class="bi bi-laptop-fill"></i></label>

									<input value="heart-pulse" type="radio" class="btn-check" name="type" id="health">
									<label class="btn btn-outline-dark" for="health"><i class="bi bi-heart-pulse-fill"></i></label>

									<input value="house" type="radio" class="btn-check" name="type" id="asset">
									<label class="btn btn-outline-dark" for="asset"><i class="bi bi-house-fill"></i></label>
								</div>
							</div>
						</form>
						<div class="modal-footer">
							<div class="row w-100">
								<div class="col">
									<button id="left-button" class="btn w-100 negative">
										Edit
									</button>
								</div>
								<div class="col">
									<button id="right-button" class="btn w-100 positive">
										Close
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!--settings offcanvas-->
		<div class="offcanvas offcanvas-start" tabindex="-1" id="settings">
			<div class="offcanvas-header">
				<div class="offcanvas-title"><i class="bi bi-wallet-fill me-2"></i><span>Saving</span></div>
				<button class="btn-close" data-bs-dismiss="offcanvas"></button>
			</div>
			<div class="offcanvas-body">
				<form id="manual-form" class="form">
					<fieldset class="mb-3">
						<legend>
							Budget Allocation
						</legend>
						<label class="form-label">Goal</label>
						<select class="form-select goals-option-container">
						</select>
						<label for="goal-target-manual" class="form-label">
							Budget
						</label>
						<input id="goal-target-manual" type="number" class="form-control" step="0.01" placeholder="0.00">
					</fieldset>
					<button id="manual-saved-btn" class="btn positive w-100">
						Save
					</button>
				</form>
			</div>
		</div>
		<div class="container-fluid">
			<div class="row">
				<div class="col-12 col-lg-2 m-0 p-0">
					<aside class="d-none d-lg-block" style="position: sticky; top: 0; height: 100dvh;">
						<div class="h-100" style="position: relative; overflow: hidden; ">
							<img class="start-0 bottom-0 w-100" style="object-fit: cover; position: absolute ; object-position: -50px 0px;" src="assets/bg_ball.png" alt="title-bg">
							<div style="position: absolute;" class="top-0 start-0 w-100 h-100 d-flex flex-column p-3 justify-content-center">
								<h1 class="h1" style="z-index: 1;">Savings Goal</h1>
								<p class="mute">life better</p>
								<div class="btn-pilled-group start-0 top-0 mx-auto" style="position: ralative; z-index: 1;">
									<button class="btn btn-dark btn-add" data-bs-toggle="modal" data-bs-target="#goal-modal">
										<i class="bi bi-plus"></i>
									</button>
									<button class="btn btn-outline-dark btn-settings" data-bs-toggle="offcanvas" data-bs-target="#settings">
										<i class="bi bi-wallet-fill"></i>
									</button>
								</div>
								<img class="end-0 h-100 p-2" style="position: absolute; object-fit: contain; width: 50%; max-height: 140px;" src="assets/saving_logo.png" alt="logo-img">
							</div>
						</div>
					</aside>
					<img class="start-0 top-20 d-lg-none" style="object-fit: contain; position: absolute; max-width: 40%; object-position: -80px -50px; z-index: -1;" src="assets/bg_ball.png" alt="title-bg">
					<aside class="d-lg-none">
						<div style="position: relative; overflow: hidden ; height: 140px;">
							<img class="end-0 top-50 pe-1 pb-5 h-100" style="object-fit: contain; position: absolute; max-width: 30%; max-height: 100px;" src="assets/saving_logo.png" alt="logo-img">
							<div style="position: absolute;" class="start-0 top-0 w-100 h-100 d-flex flex-column justify-content-center text-center">
								<div class="btn-pilled-group start-0 top-0 p-1 me-auto" style="position: relative;">
									<button class="btn btn-dark btn-add" data-bs-toggle="modal" data-bs-target="#goal-modal">
										<i class="bi bi-plus"></i>
									</button>
									<button class="btn btn-outline-dark btn-settings" data-bs-toggle="offcanvas" data-bs-target="#settings">
										<i class="bi bi-wallet-fill"></i>
									</button>
								</div>
								<h1 class="h1">Savings Goal</h1>
								<p class="mute">life better</p>
							</div>
						</div>
					</aside>
				</div>
				<div class="col-12 col-lg-10 p-2">
					<main>
						<div class="row g-2 g-lg-3">
							<div class="order-0 col-12 col-lg-5">
								<section class="h-100 w-100" id="analytic">
									<h2 class="h2 text-center mt-4">
										Overview
									</h2>
									<div class="row g-4 p-4 justify-content-center my-auto">
										<div class="col-4 text-center glow">
											<h3 class="h3">
												Total Saved
											</h3>
											<h4 id="total-saved" class="h4 d-block w-100" >
												RM 0.00	
											</h4>
										</div>
										<div class="col-4 text-center glow">
											<h3 class="h3">
												Daily Saved
											</h3>
											<h4 id="daily-saved" class="h4 d-block w-100">
												RM 0.00	
											</h4>
										</div>
										<div class="col-4 text-center glow">
											<h3 class="h3">
												Daily Required
											</h3>
											<h4 id="daily-required" class="h4 d-block w-100">
												RM 0.00	
											</h4>
										</div>	
										<div class="col-6 text-center glow">
											<h3 class="h3">
												Overall Completion
											</h3>
											<h4 id="overall-completion" class="h4 d-block w-100">
												100%	
											</h4>
										</div>
										<div class="col-6 text-center glow">
											<h3 class="h3">
												Urgent Goals
											</h3>
											<h4 id="urgent-goals" class="h4">
												0
											</h4>
										</div>
									</div>
								</section>
							</div>
							<div class="order-1 col-12 col-lg-7">
								<section class="h-100 w-100" style="background-color: rgba(255, 255, 255,0.6); border-radius: 20px; padding: 2%;">
									<h2 class="h2">
										Almost done!
									</h2>
									<div class="near-card-container">

									</div>
								</section>
							</div>
							<div class="order-3 col-12 col-lg-9">
								<section class="h-100 w-100" style="background-color: rgba(255, 255, 255,0.6); border-radius: 20px; padding: 2%;">
									<div class="row">
										<div class="col">
											<div class="btn-pilled-group mb-1 ms-1" id="filter-btn-container">
												<input value="all" type="radio" class="btn-check" name="goals-filter" id="all" checked>
												<label class="btn btn-outline-secondary" for="all">All</label>
											
												<input value="short" type="radio" class="btn-check" name="goals-filter" id="short-goals">
												<label class="btn btn-outline-secondary" for="short-goals">Short</label>
											
												<input value="middle" type="radio" class="btn-check" name="goals-filter" id="middle-goals">
												<label class="btn btn-outline-secondary" for="middle-goals">Middle</label>
			
												<input value="long" type="radio" class="btn-check" name="goals-filter" id="long-goals">
												<label class="btn btn-outline-secondary" for="long-goals">Long</label>
											</div>
										</div>
									</div>
									<div class="row cards-list m-0 goal-card-container">
										
									</div>
								</section>
							</div>
							<div class="order-2 col-12 col-lg-3">
								<section class="h-100 w-100" style="background-color: rgba(255, 255, 255,0.6); border-radius: 20px; padding: 2%;">
									<h2 class="h2">
										Urgent List
									</h2>
									<ul class="list-group mb-4 urgent-list-container">
									</ul>
								</section>
							</div>
						</div>
					</main>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
		<script src="js/savings.js"></script>
	</body>
</html>
